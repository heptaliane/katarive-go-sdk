version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/heptaliane/katarive-go-sdk/gen/pb
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/pb
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: gen/pb
    opt:
      - paths=source_relative
